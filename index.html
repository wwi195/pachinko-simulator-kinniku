<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>eフィーバーキン肉マン 疑似遊技シミュレーター</title>
<style>
:root{
  --gold:#ffd700;--ring:#c81e1e;--dark:#0a0a0a;
  --panel:#111;--panel2:#1a1a1a;--text:#f0e6c8;
  --dim:#777;--red:#ef4444;--green:#22c55e;
  --purple:#a855f7;--cyan:#06b6d4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--dark);color:var(--text);
  font-family:'Helvetica Neue',Arial,sans-serif;
  max-width:480px;margin:0 auto;overflow-x:hidden;
}
.bok{display:inline-block;padding:13px 28px;background:linear-gradient(135deg,#7a0000,#c81e1e,#ffd700,#7a0000);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:8px;}
.bok:active{transform:scale(.97);}
#ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;}
#ov.h{display:none;}
#mb{width:100%;max-width:400px;max-height:90vh;overflow-y:auto;border-radius:16px;padding:22px;text-align:center;animation:mbPop .32s cubic-bezier(.34,1.56,.64,1);}
@keyframes mbPop{from{opacity:0;transform:translateY(14px) scale(.94);}to{opacity:1;transform:translateY(0) scale(1);}}
.mn{background:var(--panel2);border:2px solid var(--gold);}
.mt{font-size:22px;font-weight:bold;margin-bottom:6px;}
.ms2{font-size:13px;color:var(--dim);margin-bottom:12px;}
#game{display:none;}
#game.active{display:flex;min-height:100vh;}
#game{flex-direction:column;height:100vh;overflow:hidden;}
#gameTitle{flex-shrink:0;text-align:center;padding:10px 10px 0;font-size:19px;font-weight:bold;color:var(--gold);text-shadow:0 0 16px rgba(200,30,30,.6);letter-spacing:2px;background:var(--panel2);}
#stats{background:var(--panel2);border-bottom:2px solid var(--ring);padding:16px 10px 5px;flex-shrink:0;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:5px;}
.sb{background:var(--panel);border-radius:8px;padding:6px 10px;display:flex;align-items:center;justify-content:center;gap:5px;}
.sl{font-size:12px;color:var(--dim);}
.sv{font-size:18px;font-weight:bold;}
.sv.neg{color:var(--red);}
.sv.gold{color:var(--gold);}
.spkSel{background:var(--panel2);color:var(--gold);border:1px solid #444;border-radius:6px;padding:4px 6px;font-size:13px;font-weight:bold;}
.spkSel:disabled{opacity:.5;}
.bbl{background:var(--panel);border-radius:8px;padding:6px 10px;margin-bottom:5px;}
.bb-top{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:4px;}
.bb-lbl{font-size:10px;color:var(--gold);}
.bb-num{font-size:28px;font-weight:bold;color:var(--gold);line-height:1;}
#ctrl{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 14px 10px;gap:10px;border-bottom:1px solid #2a2a2a;}
.mb{border:none;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:all .1s;border-radius:10px;padding:14px;color:#fff;}
.mb:active:not(:disabled){transform:scale(.97);}
.mb:disabled{opacity:.35;cursor:default;}
.spinRow{display:flex;justify-content:center;align-items:center;gap:14px;width:100%;}
.circ{border-radius:50%;width:44%;max-width:170px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;}
.circ .ci{font-size:30px;line-height:1;margin-bottom:6px;}
.circ .ct{font-size:13px;line-height:1.3;}
.b1{background:linear-gradient(135deg,#1a3a6b,#2563eb,#1a3a6b);}
.b100{background:linear-gradient(135deg,#6b1a1a,#dc2626,#6b1a1a);}
@keyframes btnPress{
  0%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,0);}
  35%{transform:scale(.88);box-shadow:0 0 0 3px var(--fxglow),0 0 22px 6px var(--fxglow);}
  70%{transform:scale(1.08);box-shadow:0 0 0 1px var(--fxglow),0 0 10px 2px var(--fxglow);}
  100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,255,255,0);}
}
.btnPress{animation:btnPress .38s cubic-bezier(.34,1.56,.64,1);}
.b1.btnPress{--fxglow:rgba(96,165,250,.85);}
.b100.btnPress{--fxglow:rgba(248,113,113,.85);}
.brush1,.brush10,.brushskip{flex:1;background:linear-gradient(135deg,#7a0000,#c81e1e,#ffd700,#7a0000);padding:14px 4px;font-size:13px;}
.brt{width:100%;max-width:380px;border-radius:14px;background:var(--panel2);border:1px solid #444;color:var(--dim);font-size:13px;padding:9px;max-width:200px;}
#hw{flex:1;overflow-y:auto;padding:8px 12px 20px;}
.ht{font-size:10px;color:var(--dim);margin-bottom:4px;letter-spacing:2px;}
.hi{font-size:11px;color:#888;padding:3px 0;border-bottom:1px solid #1e1e1e;line-height:1.4;}
.hi.hit{color:var(--gold);}
.hi.inv{color:#666;}
</style>
</head>
<body>

<div id="game">
  <div id="gameTitle">eキン肉マン シミュレーター</div>
  <div id="stats">
    <div class="stats-grid">
      <div class="sb"><span class="sl">投資額：</span><span class="sv neg" id="ti">¥0</span></div>
      <div class="sb"><span class="sl">現金残高：</span><span class="sv gold" id="tw">¥0</span></div>
      <div class="sb" style="grid-column:span 2;justify-content:center;gap:10px"><span class="sl">持ち玉：</span><span class="sv" id="tb" style="color:var(--cyan)">0</span><span class="sl" id="plApprox" style="font-size:12px">（収支：¥0）</span></div>
      <div class="sb"><span class="sl">スタート：</span><span class="sv" id="tc">0</span></div>
      <div class="sb"><span class="sl">総回転数：</span><span class="sv" id="tt">0</span></div>
      <div class="sb" style="grid-column:span 2;justify-content:center;gap:8px"><span class="sl">回転率：</span><select id="spkSel" class="spkSel" onchange="changeSpk(this.value)"><option value="17">17回</option><option value="15">15回</option><option value="13">13回</option></select></div>
    </div>
    <div class="bbl">
      <div class="bb-top">
        <div class="bb-lbl">大当たり合計</div>
        <div class="bb-num" id="tht">0</div>
        <div class="bb-lbl">回</div>
      </div>
      <button class="bbToggle" id="bbToggleBtn" onclick="toggleDetail()" style="width:100%;background:var(--panel);border:1px solid #333;color:var(--gold);font-size:11px;padding:6px;border-radius:6px;margin-bottom:4px;cursor:pointer;letter-spacing:1px">▶ 詳細を見る</button>
      <div class="bbDetail" id="bbDetail" style="display:none;font-size:10px;color:var(--dim)">
        <div class="br" style="display:flex;justify-content:space-between"><span>初回大当たり</span><span class="bv" id="thFirst">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>チャージ発生</span><span class="bv" id="thCharge">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>チャージ→RUSH突入</span><span class="bv" id="thChargeRush">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>RUSHチャレンジ成功</span><span class="bv" id="thRushOk">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>RUSHチャレンジ失敗</span><span class="bv" id="thRushNg">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>7500ボーナス</span><span class="bv" id="thStock5">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>6000ボーナス</span><span class="bv" id="thStock4">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>4500ボーナス</span><span class="bv" id="thStock3">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>3000ボーナス</span><span class="bv" id="thStock2">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>1500ボーナス</span><span class="bv" id="thStock1">0回</span></div>
        <div class="br" style="display:flex;justify-content:space-between"><span>専用モード はずれ</span><span class="bv" id="thStock0">0回</span></div>
      </div>
    </div>
    <div id="rushBadge" style="display:none;text-align:center;color:var(--gold);font-weight:bold;font-size:13px;margin-top:4px">
      RUSH中　残りST <span id="rushStVal">0</span>　<span id="renchanVal">1</span>連チャン中
      <div style="font-size:12px;margin-top:2px">獲得出玉：<span id="rushGrossVal">0</span>発</div>
    </div>
  </div>

  <div id="ctrl">
    <div id="normalCtrl" class="spinRow">
      <button class="mb b1 circ" id="btn1" onclick="doSpin1()"><span class="ci">▶</span><span class="ct">スタート<br>1回転</span></button>
      <button class="mb b100 circ" id="btn100" onclick="doSpin100()"><span class="ci">⏩</span><span class="ct">100回転<br>スキップ</span></button>
    </div>
    <div id="rushCtrl" class="spinRow" style="display:none">
      <button class="mb brush1" id="btnR1" onclick="doRushSpin1()">1回転</button>
      <button class="mb brush10" id="btnR10" onclick="doRushSpin10()">10回転</button>
      <button class="mb brushskip" id="btnRSkip" onclick="doRushSkip()">次発展まで</button>
    </div>
    <div class="spinRow">
      <button class="mb brt" id="btnr" onclick="doRetire()" style="flex:1">退店</button>
      <button class="mb brt" id="btnRank" onclick="showRanking()" style="flex:1">🏆 ランキング</button>
    </div>
  </div>

  <div id="hw">
    <div class="ht">— 遊技履歴 —</div>
    <div id="hl"></div>
  </div>
</div>

<div id="ov" class="h"><div id="mb"></div></div>

<script>
'use strict';

const C={
  WALLET:100000,
  EX:4.0,
  BPK:250,
  SPIN_LIMIT:2800,
};

function changeSpk(v){
  if(S.spkLocked) return;
  S.spk=Number(v);
  S.bps=C.BPK/S.spk;
  updS();
}

let _res=null;
/* _modalLock: guards against a rapid double-click landing on the NEXT
   modal in a chain. It's set the instant a modal is rendered and only
   cleared after a real paint has happened (via double rAF), so a click
   event that was already queued before that paint (i.e. a click meant
   for the previous modal) gets ignored by closeM() instead of silently
   dismissing a modal the user never got to read. */
let _modalLock=false;
function showM(html,theme){
  const ov=document.getElementById('ov');
  const box=document.getElementById('mb');
  ov.style.background='';
  box.className=theme||'mn'; box.innerHTML=html;
  ov.classList.remove('h');
  box.style.animation='none';
  void box.offsetWidth; // force reflow so mbPop replays on every screen change, not just the first
  box.style.animation='';
  _modalLock=true;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{_modalLock=false;}));
  return new Promise(r=>{_res=r;});
}
function closeM(){
  if(_modalLock) return;
  document.getElementById('ov').classList.add('h');
  if(_res){_res();_res=null;}
}

/* ============================================================
   TEST HOOK — rand() wraps Math.random so Playwright can force
   deterministic outcomes via window.__TEST__.setRandomQueue([...]).
   Consumed in call order; falls back to real Math.random() once
   the queue is empty.
============================================================ */
let _randQueue=[];
function rand(){
  if(_randQueue.length) return _randQueue.shift();
  return Math.random();
}
window.__TEST__={
  setRandomQueue(arr){ _randQueue=arr.slice(); },
};

/* ============================================================
   SPEC CONSTANTS
============================================================ */
Object.assign(C,{
  P_HIT: 1/399.9,
  B_UNIT_GROSS: 1500,
  B_UNIT_NET: 1400,
  P_SENBARE: 0.90,     // 先バレ演出発生率、かつ先バレ止まり時の信頼度
  P_LEVABURU: 0.95,    // レバブル演出発生率、かつレバブル止まり時の信頼度
  P_VFLA: 0.15,         // 図柄揃い時のRUSH(50%)のうち30%で発生 = 0.5*0.3。発生時の信頼度は100%
  P_RELIABILITY_NONE: 0.50, // 先バレ/レバブル/Vフラいずれも発生しなかった場合の信頼度
  P_RUSH_ENTRY: 0.50,
  RUSH_ST: 145,
  P_HATTEN: 1/92.3,
  P_STOCK_HIT: 1/2.8,
  STOCK_COUNT: 5,
  P_ZERO_RESET: 0.50,
  P_CHARGE: 1/2706,
  CHARGE_AWARD: 280,
  P_CHARGE_RUSH: 0.03,
});

/* ============================================================
   STATE
============================================================ */
let S={};
let _busy=false,_closingChoice=null;

function newState(){
  const spk=17;
  S={
    wallet:C.WALLET, balls:0,
    cashUsed:0, investB:0, recovB:0,
    hits:{
      total:0,
      first:0,
      rushSuccess:0,
      rushFail:0,
      stock:[0,0,0,0,0,0], // index = 専用モードでの当たり数(0〜5)、値=発生回数
      charge:0,
      chargeRush:0,
    },
    cur:0, ttl:0,
    spk, bps:C.BPK/spk, spkLocked:false,
    exRate:C.EX,
    hist:[],
    pendingInvest:0,
    spinLimit:C.SPIN_LIMIT, limitPassed:false,
    rushActive:false, rushST:0, preDevST:0, renchan:0, rushStock:[0,0,0,0,0,0],
    rushGrossTotal:0,
  };
}

function floor500(y){return Math.floor(y/500)*500;}

function updS(){
  checkBulkUnlock();
  document.getElementById('ti').textContent=S.cashUsed>0?`−¥${S.cashUsed.toLocaleString()}`:'¥0';
  document.getElementById('tw').textContent=`¥${S.wallet.toLocaleString()}`;
  document.getElementById('tb').textContent=Math.floor(S.balls).toLocaleString();
  const approxExch=floor500(Math.floor(S.balls)*S.exRate);
  const approxPL=Math.round(approxExch-S.cashUsed);
  const plEl=document.getElementById('plApprox');
  plEl.textContent=`（収支：${approxPL>=0?'+':'−'}¥${Math.abs(approxPL).toLocaleString()}）`;
  plEl.style.color=approxPL>=0?'var(--green)':'var(--red)';
  document.getElementById('tht').textContent=S.hits.total;
  document.getElementById('tc').textContent=S.cur;
  document.getElementById('tt').textContent=S.ttl;
  document.getElementById('rushBadge').style.display=S.rushActive?'block':'none';
  document.getElementById('rushStVal').textContent=S.rushST;
  document.getElementById('renchanVal').textContent=S.renchan;
  document.getElementById('rushGrossVal').textContent=S.rushGrossTotal.toLocaleString();
  document.getElementById('normalCtrl').style.display=S.rushActive?'none':'flex';
  document.getElementById('rushCtrl').style.display=S.rushActive?'flex':'none';
  document.getElementById('thFirst').textContent=`${S.hits.first}回`;
  document.getElementById('thCharge').textContent=`${S.hits.charge}回`;
  document.getElementById('thChargeRush').textContent=`${S.hits.chargeRush}回`;
  document.getElementById('thRushOk').textContent=`${S.hits.rushSuccess}回`;
  document.getElementById('thRushNg').textContent=`${S.hits.rushFail}回`;
  document.getElementById('thStock5').textContent=`${S.hits.stock[5]}回`;
  document.getElementById('thStock4').textContent=`${S.hits.stock[4]}回`;
  document.getElementById('thStock3').textContent=`${S.hits.stock[3]}回`;
  document.getElementById('thStock2').textContent=`${S.hits.stock[2]}回`;
  document.getElementById('thStock1').textContent=`${S.hits.stock[1]}回`;
  document.getElementById('thStock0').textContent=`${S.hits.stock[0]}回`;
}

let _detailOpen=false;
function toggleDetail(){
  _detailOpen=!_detailOpen;
  document.getElementById('bbDetail').style.display=_detailOpen?'block':'none';
  document.getElementById('bbToggleBtn').textContent=_detailOpen?'▼ 詳細を閉じる':'▶ 詳細を見る';
}

function ensureBalls(){
  while(S.balls<S.bps){
    if(S.wallet<1000) return false;
    S.wallet-=1000; S.balls+=C.BPK;
    S.cashUsed+=1000; S.investB+=C.BPK;
    S.pendingInvest+=1000;
  }
  return true;
}
function consume(){S.balls-=S.bps; S.cur++; S.ttl++;}
function award(n){S.balls+=n; S.recovB+=n;}

function addH(t,c=''){
  S.hist.unshift({t,c});
  if(S.hist.length>150) S.hist.pop();
  document.getElementById('hl').innerHTML=S.hist.map(h=>`<div class="hi ${h.c}">${h.t}</div>`).join('');
}
function flushInvest(){
  if(S.pendingInvest>0){
    addH(`${S.cur}回転目：追加投資 ${S.pendingInvest.toLocaleString()}円`,'inv');
    S.pendingInvest=0;
  }
}

function lockAll(v){
  ['btn1','btn100','btnR1','btnR10','btnRSkip','btnr'].forEach(id=>{
    const e=document.getElementById(id); if(e) e.disabled=v;
  });
}

/* ============================================================
   CLOSING TIME (閉店/居座り) — 2000-rotation normal-mode limit,
   reused from garo7500. Only applies to normal-mode play.
============================================================ */
function tmClosingTime(){return `
  <div class="mt" style="color:var(--gold)">🕐 閉店時間になりました</div>
  <div class="ms2" style="line-height:1.8">
    通常時 <strong style="color:var(--text)">${S.spinLimit}回転</strong> に達しました。<br>
    闇パチに移動しますか？（非合法オールナイト営業へ）<br><br>
    <span style="color:#f87171">※闇パチへ進むと、ここまでの出玉は最高出玉ランキングの対象外になります</span>
  </div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button class="bok" style="flex:1;background:#1e1e1e;color:#999;border:1px solid #444" onclick="chooseRetire()">いいえ（退店する）</button>
    <button class="bok" style="flex:1" onclick="chooseContinue()">はい（闇パチへ）</button>
  </div>`;}

function tmAfterClosing(){return `
  <div class="mt" style="color:var(--purple)">🌙 闇パチ突入</div>
  <div class="ms2" style="line-height:1.9">
    シャッターの下りた店内へ。<br>
    ここから先は看板を落とした非合法のオールナイト営業だ。<br><br>
    <span style="color:var(--gold);font-weight:bold">出玉も、リスクも、ここからが本番。</span>
  </div>
  <button class="bok" onclick="closeM()">わかった！続ける！</button>`;}

function chooseRetire(){_closingChoice='retire';closeM();}
function chooseContinue(){_closingChoice='continue';closeM();}

/* ============================================================
   RANKING — 所持金以内または2800回転（闇パチ移行前）で退店した
   時点の持ち玉数を、上位10件までブラウザのlocalStorageに保存する。
============================================================ */
const RANK_KEY='kinnikuRankingV1';
function loadRanking(){
  try{
    const raw=localStorage.getItem(RANK_KEY);
    return raw?JSON.parse(raw):[];
  }catch(e){ return []; }
}
function saveRanking(list){
  try{ localStorage.setItem(RANK_KEY, JSON.stringify(list)); }catch(e){}
}
function recordRanking(balls){
  const list=loadRanking();
  const d=new Date();
  const entry={balls, date:`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`};
  list.push(entry);
  list.sort((a,b)=>b.balls-a.balls);
  const trimmed=list.slice(0,10);
  saveRanking(trimmed);
  return {list:trimmed, entry, madeList:trimmed.includes(entry)};
}
function renderRankingList(list, highlightEntry){
  if(list.length===0) return `<div class="ms2" style="text-align:center">まだ記録がありません</div>`;
  return list.map((r,i)=>{
    const isNew=r===highlightEntry;
    return `<div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px${isNew?';color:var(--gold);font-weight:bold':''}"><span class="sk">${i+1}位${isNew?' 🆕':''}</span><span class="sv2">${r.balls.toLocaleString()}玉 <span style="font-size:10px;color:var(--dim)">${r.date}</span></span></div>`;
  }).join('');
}
function showRanking(){
  const html=`
    <div class="mt" style="color:var(--gold)">🏆 最高出玉ランキング</div>
    <div class="ms2">所持金以内・2800回転（闇パチ移行前）での記録</div>
    ${renderRankingList(loadRanking())}
    <button class="bok" onclick="closeM()" style="margin-top:14px">閉じる</button>`;
  showM(html,'mn');
}

/* ============================================================
   BULK STOCK-FILL 恒久アンロック — 闇パチ中・5連以上・獲得出玉
   1万発以上のいずれか1つでも一度達成したら、以降は全セッションで
   （連チャン数に関わらず）保留5個一気貯めボタンが使えるようになる。
============================================================ */
const BULK_UNLOCK_KEY='kinnikuBulkUnlockedV1';
let _bulkUnlocked=(()=>{ try{ return localStorage.getItem(BULK_UNLOCK_KEY)==='1'; }catch(e){ return false; } })();
function checkBulkUnlock(){
  if(_bulkUnlocked) return;
  if(S.limitPassed || S.renchan>=5 || S.rushGrossTotal>=10000){
    _bulkUnlocked=true;
    try{ localStorage.setItem(BULK_UNLOCK_KEY,'1'); }catch(e){}
    addH(`闇パチ中・5連以上・獲得出玉1万発のいずれかを達成 → 以降、保留5個一気貯めが使えるようになった`,'inv');
  }
}

async function handleClosingTime(){
  if(!S.spinLimit||S.limitPassed||S.ttl<S.spinLimit||S.rushActive) return false;
  _closingChoice=null;
  await showM(tmClosingTime(),'mn');
  if(_closingChoice==='retire'){showSettle();return true;}
  S.limitPassed=true;
  await showM(tmAfterClosing(),'mn');
  return true;
}

  updS();

  S.cur=0;
  updS();
}

async function runSenyouMode(){
  S.preDevST=S.rushST;
  // 今回のRUSH中に5連チャン以上達成（6連目から）、または過去に恒久アンロック済みならOK
  const bulkEligible=S.renchan>=6 || _bulkUnlocked;
  _senyouFillChoice='oneByOne';
  await showM(tmSenyouIn(bulkEligible),'mn');

  if(bulkEligible && _senyouFillChoice==='bulk'){
    addH(`${S.renchan}連目：保留5個を一気に貯めた`,'inv');
    await showM(tmStockFill(C.STOCK_COUNT),'mn');
  } else {
    for(let i=1;i<=C.STOCK_COUNT;i++){
      await showM(tmStockFill(i),'mn');
    }
  }
  await showM(tmJudgeButton(),'mn');

  let hitCount=0;
  for(let i=0;i<C.STOCK_COUNT;i++){
    if(rand()<C.P_STOCK_HIT) hitCount++;
  }
  S.hits.stock[hitCount]++;
  S.rushStock[hitCount]++;

  if(hitCount===0){
    let stReset;
    if(rand()<C.P_ZERO_RESET){
      S.rushST=C.RUSH_ST;
      stReset=true;
      addH(`専用モード：はずれ（0/5）→ ST${C.RUSH_ST}にリセット`,'inv');
    } else {
      S.rushST=S.preDevST;
      stReset=false;
      addH(`専用モード：はずれ（0/5）→ ST${S.preDevST}回転から再開`,'inv');
    }
    updS();
    await showM(tmStockResult(0,stReset,S.rushST),'mn');
  } else {
    const gross=hitCount*C.B_UNIT_GROSS;
    const net=hitCount*C.B_UNIT_NET;
    award(net);
    S.hits.total++;
    S.rushGrossTotal+=gross;
    S.rushST=C.RUSH_ST;
    S.renchan++;
    addH(`専用モード：${hitCount}/5 当たり → ${gross}ボーナス（実質+${net}発）→ ST${C.RUSH_ST}にリセット（${S.renchan}連目）`,'hit');
    updS();
    await showM(tmAtariIn(),'mn');
    if(hitCount>=2){
      await showM(tmVImage(hitCount),'mn');
    }
    await showM(tmStockResult(hitCount,true,C.RUSH_ST,S.renchan),'mn');
  }
}

async function runNormalWinChain(){
  const spin0=S.cur;
  const senbare=rand()<C.P_SENBARE;
  if(senbare){
    await showM(tmSenbare(spin0),'mn');
  }

  const levaburu=rand()<C.P_LEVABURU;
  if(levaburu){
    await showM(tmLevaburu(),'mn');
  }
  const vfla=rand()<C.P_VFLA;
  if(vfla){
    await showM(tmVfla(),'mn');
  }
  await showM(tmJudge(),'mn');

  // 信頼度は一番強い演出（Vフラ>レバブル>先バレ）だけで決まる。どれも
  // 出なかった場合は P_RELIABILITY_NONE を使う。
  const reliability=vfla?1:levaburu?C.P_LEVABURU:senbare?C.P_SENBARE:C.P_RELIABILITY_NONE;
  const isWin=rand()<reliability;

  if(!isWin){
    addH(`${spin0}回転目：${senbare?'先バレ→':''}ジャッジ→残念、当たりならず`,'inv');
    await showM(tmMiss(),'mn');
    updS();
    return;
  }

  S.hits.total++;
  award(C.B_UNIT_NET);
  S.hits.first++;
  S.renchan=1;
  updS();
  await showM(tmHatsuAtari(),'mn');
  addH(`${spin0}回転目：${senbare?'先バレ→':''}ジャッジ→初回大当たり(1500) → 実質+${C.B_UNIT_NET}発`,'hit');

  if(vfla){
    // Vフラは確実に当たり＋RUSH突入。チャレンジ抽選なしで直接RUSHへ。
    S.hits.rushSuccess++;
    S.rushActive=true;
    S.rushST=C.RUSH_ST;
    S.rushStock=[0,0,0,0,0,0];
    S.rushGrossTotal=C.B_UNIT_GROSS;
    updS();
    await showM(tmRushResult(true),'mn');
  } else {
    await showM(tmRushChallenge(),'mn');
    const rushWin=rand()<C.P_RUSH_ENTRY;
    if(rushWin){
      S.hits.rushSuccess++;
      S.rushActive=true;
      S.rushST=C.RUSH_ST;
      S.rushStock=[0,0,0,0,0,0];
      S.rushGrossTotal=C.B_UNIT_GROSS;
      updS();
      await showM(tmRushResult(true),'mn');
    } else {
      S.hits.rushFail++;
      updS();
      await showM(tmRushResult(false),'mn');
    }
  }
  S.cur=0;
  updS();
}

/* ============================================================
   SPIN LOOP (normal-mode hit chain added in Task 4,
   RUSH added in Task 5/6 — for now, normal mode always misses)
============================================================ */
async function oneSpin(){
  if(S.rushActive){
    // RUSH/ST中は電サポで玉が減らない仕様。ST中の回転は総回転数・
    // スタートには含めない（S.cur/S.ttlは増やさない）。
    updS();
    S.rushST--;
    if(rand()<C.P_HATTEN){
      addH(`ST${C.RUSH_ST-S.rushST}回転目：発展！`,'hit');
      await runSenyouMode();
      return {stopped:true};
    }
    if(S.rushST<=0){
      await endRush();
      return {stopped:true};
    }
    return {ok:true};
  }

  if(!ensureBalls()) return {over:true};
  consume(); updS();

  if(rand()<C.P_HIT){
    flushInvest();
    await runNormalWinChain();
    return {stopped:true};
  }
  if(rand()<C.P_CHARGE){
    flushInvest();
    await runChargeEvent();
    return {stopped:true};
  }
  return {ok:true};
}

function pressFx(el){
  el.classList.remove('btnPress');
  void el.offsetWidth; // force reflow so the animation replays on rapid re-clicks
  el.classList.add('btnPress');
}

function lockSpk(){
  if(S.spkLocked) return;
  S.spkLocked=true;
  document.getElementById('spkSel').disabled=true;
}

async function doSpin1(){
  if(_busy) return;
  lockSpk();
  pressFx(document.getElementById('btn1'));
  _busy=true; lockAll(true);
  const r=await oneSpin();
  _busy=false; lockAll(false);
  if(r.over){showSettle();return;}
  if(await handleClosingTime()) return;
  updS();
}

async function doSpin100(){
  if(_busy) return;
  lockSpk();
  pressFx(document.getElementById('btn100'));
  _busy=true; lockAll(true);
  let over=false;
  for(let i=0;i<100;i++){
    const r=await oneSpin();
    if(r.over){over=true;break;}
    if(r.stopped) break;
    if(S.spinLimit&&!S.limitPassed&&S.ttl>=S.spinLimit) break;
  }
  _busy=false; lockAll(false);
  if(over){showSettle();return;}
  if(await handleClosingTime()) return;
  updS();
}

async function doRushSpin1(){
  if(_busy||!S.rushActive) return;
  _busy=true; lockAll(true);
  const r=await oneSpin();
  _busy=false; lockAll(false);
  if(r.over){showSettle();return;}
  updS();
}

async function doRushSpin10(){
  if(_busy||!S.rushActive) return;
  _busy=true; lockAll(true);
  let over=false;
  for(let i=0;i<10 && S.rushActive;i++){
    const r=await oneSpin();
    if(r.over){over=true;break;}
    if(r.stopped) break;
  }
  _busy=false; lockAll(false);
  if(over){showSettle();return;}
  updS();
}

async function doRushSkip(){
  if(_busy||!S.rushActive) return;
  _busy=true; lockAll(true);
  let over=false;
  while(S.rushActive){
    const r=await oneSpin();
    if(r.over){over=true;break;}
    if(r.stopped) break;
  }
  _busy=false; lockAll(false);
  if(over){showSettle();return;}
  updS();
}

function doRetire(){
  if(_busy) return;
  lockAll(true);
  showSettle();
}

function showSettle(){
  const rawExchY=Math.floor(S.balls)*S.exRate;
  const exchY=floor500(rawExchY);
  const finalPL=Math.round(exchY-S.cashUsed);
  const outRate=S.investB>0?Math.round(Math.floor(S.balls)/S.investB*100):0;
  const plColor=finalPL>=0?'#22c55e':'#ef4444';
  const plSign=finalPL>=0?'+':'';

  // 闇パチ（居座り継続）を経由した場合はランキング対象外。
  let rankHtml;
  if(S.limitPassed){
    rankHtml=`
      <hr style="border-color:#333;margin:8px 0">
      <div class="mt" style="font-size:16px;color:var(--gold)">🏆 最高出玉ランキング</div>
      <div class="ms2" style="color:#888">闇パチを経由したため今回は対象外です</div>`;
  } else {
    const {list, entry, madeList}=recordRanking(Math.floor(S.balls));
    rankHtml=`
      <hr style="border-color:#333;margin:8px 0">
      <div class="mt" style="font-size:16px;color:var(--gold)">🏆 最高出玉ランキング</div>
      ${madeList?'<div class="ms2" style="color:var(--gold)">ランクイン！</div>':''}
      ${renderRankingList(list, entry)}`;
  }

  const html=`
    <div class="mt" style="color:var(--gold)">精算</div>
    <hr style="border-color:#333;margin:8px 0">
    <div class="sr" style="display:flex;justify-content:space-between;padding:6px 0"><span class="sk">持ち玉</span><span class="sv2">${Math.floor(S.balls).toLocaleString()}玉</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:6px 0"><span class="sk">換金（等価）</span><span class="sv2">¥${Math.round(exchY).toLocaleString()}</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:6px 0"><span class="sk">総投資</span><span class="sv2" style="color:var(--red)">−¥${S.cashUsed.toLocaleString()}</span></div>
    <hr style="border-color:#333;margin:8px 0">
    <div class="sfin" style="color:${plColor};font-size:26px;font-weight:bold;text-align:center;padding:12px 0">${plSign}¥${Math.abs(finalPL).toLocaleString()}</div>
    <hr style="border-color:#333;margin:8px 0">
    <div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span class="sk">総回転数</span><span class="sv2">${S.ttl}回</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span class="sk">大当たり合計</span><span class="sv2">${S.hits.total}回</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span class="sk">初回大当たり</span><span class="sv2">${S.hits.first}回</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span class="sk">チャージ発生/→RUSH突入</span><span class="sv2">${S.hits.charge}/${S.hits.chargeRush}</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span class="sk">RUSHチャレンジ成功/失敗</span><span class="sv2">${S.hits.rushSuccess}/${S.hits.rushFail}</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span class="sk">7500/6000/4500/3000/1500ボーナス・はずれ</span><span class="sv2">${S.hits.stock[5]}/${S.hits.stock[4]}/${S.hits.stock[3]}/${S.hits.stock[2]}/${S.hits.stock[1]}/${S.hits.stock[0]}</span></div>
    <div class="sr" style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span class="sk">出玉率</span><span class="sv2" style="color:${outRate>=100?'#22c55e':'#ef4444'}">${outRate}%</span></div>
    ${rankHtml}
    <div style="margin-top:18px;text-align:center">
      <button class="bok" onclick="location.reload()">もう一度遊ぶ</button>
    </div>`;
  showM(html,'mn');
}
